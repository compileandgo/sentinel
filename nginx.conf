worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Upstream backend cluster (Load balancing)
    upstream sentinel_cluster {
        # Least connections algorithm is optimal for long-lived connection scenarios (like SSE / long research processes)
        least_conn;

        server 127.0.0.1:8000 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:8001 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:8002 max_fails=3 fail_timeout=10s;

        # Keepalive connections to upstreams to reduce latency/TCP handshake overhead
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # Direct client body size configuration
        client_max_body_size 50M;

        # Proxy header defaults
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Route all traffic to the Sentinel backend cluster
        location / {
            proxy_pass http://sentinel_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Timeouts for standard HTTP requests
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Dedicated configuration for Server-Sent Events (SSE) stream endpoints
        location ~ ^/api/(chat/stream|research/stream|runs/[^/]+/stream) {
            proxy_pass http://sentinel_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # SSE streaming configuration (prevents Nginx from buffering response chunks)
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            
            # Long timeouts to prevent termination of long research processes
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            
            # Bypass gzip compression for active event streams
            gzip off;
        }
    }
}
